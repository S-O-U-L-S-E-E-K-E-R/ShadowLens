version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: shadowlens-backend
    ports:
      - "8001:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - AIS_API_KEY=${AIS_API_KEY}
      - OPENSKY_CLIENT_ID=shadowbroker-api-client
      - OPENSKY_CLIENT_SECRET=qtAF9Y8teWGt8SG013NNWmukrehKsjaF
      - LTA_ACCOUNT_KEY=${LTA_ACCOUNT_KEY}
      - OPENCELLID_API_KEY=pk.1b0e5e66ae9a474feb0f522b6ac260c4
      - OSINT_AGENT_URL=http://host.docker.internal:8002
    volumes:
      - backend_data:/app/data
      - ./osint-data:/app/osint-data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Optional: set this to your backend's external URL if using custom ports
        # e.g. http://192.168.1.50:9096 — leave empty to auto-detect from browser
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    container_name: shadowlens-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
